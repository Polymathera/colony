site_name: Colony
site_description: "Polymathera's no-RAG, cache-aware multi-agent framework for extremely long context (1B+ tokens)"
site_url: https://polymathera.github.io/colony
repo_url: https://github.com/polymathera/colony
repo_name: polymathera/colony

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Key Concepts: getting-started/concepts.md
    - Example Gallery: getting-started/example-gallery.md
  - Examples:
    - Gallery: examples/index.md
    - Codebase Analysis: examples/basic-analysis.md
    - Change Impact Analysis: examples/impact-analysis.md
    - Compliance Audit: examples/compliance-audit.md
    - Intent Inference: examples/intent-inference.md
    - Contract Inference: examples/contract-inference.md
    - Program Slicing: examples/program-slicing.md
    - Multi-Analysis Workflow: examples/multi-analysis.md
  - Philosophy:
    - Overview: philosophy/index.md
    - The NoRAG Paradigm: philosophy/no-rag.md
    - Modular Agents: philosophy/modular-agents.md
    - Agents All the Way Down: philosophy/agents-all-the-way-down.md
    - Cache-Aware Patterns: philosophy/cache-awareness.md
    - The BDI Model: philosophy/bdi.md
  - Architecture:
    - Overview: architecture/index.md
    - Distributed Architecture: architecture/distributed.md
    - Execution Context: architecture/execution-context.md
    - Virtual Context Memory: architecture/virtual-context-memory.md
    - Agent System: architecture/agent-system.md
    - Agent Memory System: architecture/agent-memory-system.md
    - Action Policies: architecture/action-policies.md
    - Planning: architecture/planning.md
    - Blackboard Pattern: architecture/blackboard.md
    - Hook System: architecture/hook-system.md
    - Game Patterns: architecture/game-engine.md
    - Observability: architecture/observability.md
    - Training: architecture/training.md
  - Design Insights:
    - Overview: design-insights/index.md
    - Page Graphs: design-insights/page-graphs.md
    - Capabilities as AOP Aspects: design-insights/capabilities-as-aspects.md
    - Games as Error Correction Mechanisms: design-insights/game-theoretic-correctness.md
    - Abstraction Patterns: design-insights/abstraction-patterns.md
    - Memory as Observer and Observable: design-insights/memory-as-observer.md
    - Qualitative Analysis: design-insights/qualitative-analysis.md
  - Guides:
    - colony-env: guides/colony-env.md
    - Web Dashboard: guides/web-dashboard.md
    - Publishing & CI/CD: guides/publishing.md
  - API Reference:
    - reference/index.md
    - Agent: reference/agent.md
    - Models: reference/models.md
    - Action Policies: reference/policies.md
    - Memory: reference/memory.md
    - Blackboard: reference/blackboard.md
    - CLI: reference/cli.md
  - Contributing: contributing.md

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_if_no_docstring: false
            filters:
              - "!^_"
              - "^__init__$"
