# Colony local development cluster
# Usage: docker compose -f docker-compose.yml up -d
# Managed by: colony-env CLI

services:
  ray-head:
    build:
      context: ../../../../../..   # colony repo root (where pyproject.toml lives)
      dockerfile: src/polymathera/colony/cli/deploy/docker/Dockerfile.local
    image: ${COLONY_IMAGE:-colony:local}
    container_name: colony-ray-head
    command: ["/bin/bash", "/home/ray/app/src/polymathera/colony/cli/deploy/docker/ray-head-entrypoint.sh"]
    ports:
      - "${COLONY_DASHBOARD_PORT:-8265}:8265"
      - "${COLONY_CLIENT_PORT:-10001}:10001"
      - "${COLONY_METRICS_PORT:-9090}:9090"
    volumes:
      - colony-shared:/mnt/shared
      - colony-overlay:/opt/colony-overlay
      # L1-G runtime config: written by ``colony-env up`` before compose
      # invocation. The container-start hook reads it on boot. The host
      # path always exists (colony-env writes a stub when no extensions
      # are configured) so the bind mount never silently turns into a
      # directory.
      - ./.runtime/cluster-runtime.json:/etc/colony/cluster-runtime.json:ro
      # Operator YAML (the ``--config`` arg to ``colony-env up``) materialized
      # into ``.runtime/operator-config.yaml`` before compose runs. The
      # ray-head entrypoint checks /etc/colony/cluster.yaml *first* ahead of
      # the /mnt/shared/config.yaml fallback, so this bind sidesteps the
      # ``docker cp`` race (polymath deploy would otherwise read /mnt/shared
      # before colony-env can populate it and exit with FileNotFoundError).
      - ./.runtime/operator-config.yaml:/etc/colony/cluster.yaml:ro
      # Dev-only: lets SandboxedShellCapability spawn sibling containers
      # on the host Docker daemon. Production should talk to a remote
      # daemon over TLS via DOCKER_HOST — see the capability design doc.
      - /var/run/docker.sock:/var/run/docker.sock
      # Image registry editable by the operator without rebuilding.
      - ./sandbox-images.yaml:/etc/colony/sandbox-images.yaml:ro
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RAY_CLUSTER_ENVIRONMENT=true
      - POLYMATHERA_ENV=development
      - POLYMATHERA_RUNNING_LOCALLY=true
      # Workaround for protobuf>=4 / opentelemetry-proto<1.32 incompat:
      # Ray's dashboard agent imports opentelemetry pb2 files generated
      # against protobuf<4, which crash at module load with the strict
      # C++ runtime ("Descriptors cannot be created directly"). When the
      # agent dies, required Ray subprocesses never register with GCS
      # and `ray.init()` from `polymath deploy` hangs until timeout.
      # The pure-Python implementation skips the strict check.
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
      # Operator YAML path — the global ConfigurationManager loads this at
      # startup. ``colony-env up --config`` `docker cp`s the file into
      # /mnt/shared/config.yaml on the colony-shared volume mounted into
      # every container below. If the file is not yet present (the cp is
      # async w.r.t. container start), ConfigurationManager falls through to
      # defaults + env vars cleanly.
      - POLYMATHERA_CONFIG=/mnt/shared/config.yaml
      - PROMETHEUS_PORT=9090
      # Authentication - local mode
      - AUTH_ENABLED=False
      # Storage backends — local mode
      - DISTRIBUTED_FS_BACKEND=local
      - LOCAL_FS_ROOT_PATH=/mnt/shared/filesystem
      - OBJECT_STORAGE_BACKEND=disabled
      - JSON_STORAGE_BACKEND=local
      - JSON_STORAGE_LOCAL_PATH=/mnt/shared/json_storage
      - GIT_COLD_STORAGE_ENABLED=False
      - RELATIONAL_STORAGE_BACKEND=local
      # PostgreSQL
      - RDS_HOST=postgres
      - RDS_PORT=5432
      - RDS_USER=colony
      - RDS_PASSWORD=${COLONY_PG_PASSWORD:-colony_dev}
      - RDS_DB_NAME=colony
      # Observability (tracing)
      - TRACING_ENABLED=true
      - KAFKA_BOOTSTRAP=kafka:9092
      # Knowledge stack — Qdrant URL, GROBID URL, PDF extractor
      # backend, and image directory live in the operator YAML
      # (``knowledge`` — see configs/example.yaml).
      # Workers re-read the same YAML via POLYMATHERA_CONFIG, so no
      # env-var passthrough is needed for these knobs.
      # API keys — forwarded from host environment
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      # PDF-extractor API keys — only the one matching the active
      # backend is actually used at runtime.
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - LLAMA_CLOUD_API_KEY=${LLAMA_CLOUD_API_KEY:-}
      # Hugging Face Hub auth — read by the self-hosted PDF backends
      # (Marker / MinerU / Docling), by any HuggingFace-pulled model
      # weights, and propagated to Ray actor processes via the
      # ``HUGGING_FACE_`` prefix in
      # ``distributed.ray_utils.serving.proxy:RUNTIME_ENV_PREFIXES``.
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      # WebSearchCapability / ColonyDocsCapability — Tavily backend.
      # The capability stays disabled until this is set; agents see a
      # clean error dict from search_web rather than a crash.
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      # GitHubCapability — App credentials. Without all three the
      # capability stays disabled (actions return error dicts). See
      # docs/guides/capability-setup.md for App registration steps.
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_PRIVATE_KEY_PEM=${GITHUB_PRIVATE_KEY_PEM:-}
      # Same App's OAuth client (user-to-server "Connect GitHub" flow).
      - GITHUB_APP_CLIENT_ID=${GITHUB_APP_CLIENT_ID:-}
      - GITHUB_APP_CLIENT_SECRET=${GITHUB_APP_CLIENT_SECRET:-}
      # Slack chat service (optional)
      - SLACK_ENABLED=false
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      # Always-on Colony: auto-deploy cluster on container startup
      - COLONY_AUTO_DEPLOY=${COLONY_AUTO_DEPLOY:-true}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    shm_size: ${COLONY_SHM_SIZE:-4gb}
    networks:
      - colony-net
    healthcheck:
      test: ["CMD", "ray", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ray-worker:
    image: ${COLONY_IMAGE:-colony:local}
    command:
      - /home/ray/app/src/polymathera/colony/cli/deploy/docker/cluster-runtime-hook.sh
      - worker
      - --
      - bash
      - -c
      - "ray start --address=ray-head:6379 --block"
    volumes:
      - colony-shared:/mnt/shared
      - colony-overlay:/opt/colony-overlay
      # L1-G runtime config: written by ``colony-env up`` before compose
      # invocation. The container-start hook reads it on boot. The host
      # path always exists (colony-env writes a stub when no extensions
      # are configured) so the bind mount never silently turns into a
      # directory.
      - ./.runtime/cluster-runtime.json:/etc/colony/cluster-runtime.json:ro
      # Operator YAML (the ``--config`` arg to ``colony-env up``) materialized
      # into ``.runtime/operator-config.yaml`` before compose runs. The
      # ray-head entrypoint checks /etc/colony/cluster.yaml *first* ahead of
      # the /mnt/shared/config.yaml fallback, so this bind sidesteps the
      # ``docker cp`` race (polymath deploy would otherwise read /mnt/shared
      # before colony-env can populate it and exit with FileNotFoundError).
      - ./.runtime/operator-config.yaml:/etc/colony/cluster.yaml:ro
      # Workers also need Docker access so SandboxedShellCapability can
      # run from agents scheduled on them. Same dev/prod tradeoff as the
      # ray-head mount.
      - /var/run/docker.sock:/var/run/docker.sock
      - ./sandbox-images.yaml:/etc/colony/sandbox-images.yaml:ro
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RAY_CLUSTER_ENVIRONMENT=true
      - POLYMATHERA_ENV=development
      - POLYMATHERA_RUNNING_LOCALLY=true
      # Workaround for protobuf>=4 / opentelemetry-proto<1.32 incompat:
      # Ray's dashboard agent imports opentelemetry pb2 files generated
      # against protobuf<4, which crash at module load with the strict
      # C++ runtime ("Descriptors cannot be created directly"). When the
      # agent dies, required Ray subprocesses never register with GCS
      # and `ray.init()` from `polymath deploy` hangs until timeout.
      # The pure-Python implementation skips the strict check.
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
      # Operator YAML path — the global ConfigurationManager loads this at
      # startup. ``colony-env up --config`` `docker cp`s the file into
      # /mnt/shared/config.yaml on the colony-shared volume mounted into
      # every container below. If the file is not yet present (the cp is
      # async w.r.t. container start), ConfigurationManager falls through to
      # defaults + env vars cleanly.
      - POLYMATHERA_CONFIG=/mnt/shared/config.yaml
      - PROMETHEUS_PORT=9090
      # Authentication - local mode
      - AUTH_ENABLED=False
      # Storage backends — local mode
      - DISTRIBUTED_FS_BACKEND=local
      - LOCAL_FS_ROOT_PATH=/mnt/shared/filesystem
      - OBJECT_STORAGE_BACKEND=disabled
      - JSON_STORAGE_BACKEND=local
      - JSON_STORAGE_LOCAL_PATH=/mnt/shared/json_storage
      - GIT_COLD_STORAGE_ENABLED=False
      - RELATIONAL_STORAGE_BACKEND=local
      # PostgreSQL
      - RDS_HOST=postgres
      - RDS_PORT=5432
      - RDS_USER=colony
      - RDS_PASSWORD=${COLONY_PG_PASSWORD:-colony_dev}
      - RDS_DB_NAME=colony
      # Observability (tracing)
      - TRACING_ENABLED=true
      - KAFKA_BOOTSTRAP=kafka:9092
      # Knowledge stack — see ray-head for the contract. Knobs live
      # in the operator YAML; only secrets propagate as env vars.
      # API keys — forwarded from host environment
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      # PDF-extractor API keys — only the one matching the active
      # backend is used at runtime.
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - LLAMA_CLOUD_API_KEY=${LLAMA_CLOUD_API_KEY:-}
      # Hugging Face Hub auth — read by the self-hosted PDF backends
      # (Marker / MinerU / Docling) and propagated to Ray actor
      # processes via the ``HUGGING_FACE_`` prefix in
      # ``distributed.ray_utils.serving.proxy:RUNTIME_ENV_PREFIXES``.
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      # WebSearchCapability / ColonyDocsCapability — Tavily backend.
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      # GitHubCapability — App credentials. See
      # docs/guides/capability-setup.md.
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_PRIVATE_KEY_PEM=${GITHUB_PRIVATE_KEY_PEM:-}
      # Same App's OAuth client (user-to-server "Connect GitHub" flow).
      - GITHUB_APP_CLIENT_ID=${GITHUB_APP_CLIENT_ID:-}
      - GITHUB_APP_CLIENT_SECRET=${GITHUB_APP_CLIENT_SECRET:-}
      # Slack chat service (optional)
      - SLACK_ENABLED=false
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
    depends_on:
      ray-head:
        condition: service_healthy
    shm_size: ${COLONY_SHM_SIZE:-4gb}
    networks:
      - colony-net

  redis:
    image: redis:7-alpine
    container_name: colony-redis
    command: redis-server --appendonly yes --protected-mode no --maxclients 10000
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${COLONY_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - colony-net

  postgres:
    image: postgres:16-alpine
    container_name: colony-postgres
    environment:
      - POSTGRES_USER=colony
      - POSTGRES_PASSWORD=${COLONY_PG_PASSWORD:-colony_dev}
      - POSTGRES_DB=colony
    ports:
      - "${COLONY_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - colony-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colony"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    # Phase C1b — knowledge-corpus vector store (master §3.2 / §6.4).
    # Storage volume persists across `colony-env up/down` so ingested
    # corpora survive restarts; HTTP on 6333, gRPC on 6334.
    image: qdrant/qdrant:v1.16.3
    container_name: colony-qdrant
    ports:
      - "${COLONY_QDRANT_HTTP_PORT:-6333}:6333"
      - "${COLONY_QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - colony-net
    # The qdrant image ships without ``wget`` / ``curl``, so probe the
    # listening socket via bash's ``/dev/tcp`` redirection. ``readyz``
    # would be richer, but a working TCP listener is the property that
    # actually gates dependents (we don't need shard-level readiness
    # before letting agents connect — the client retries internally).
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  grobid:
    # Phase C1b — PDF -> TEI XML extractor (master §6.3). The "lite"
    # image trades GROBID's ML-based reference consolidation for a
    # ~6x smaller footprint; the API surface used by GrobidPdfReader
    # is identical.
    image: lfoppiano/grobid:0.8.0
    container_name: colony-grobid
    ports:
      - "${COLONY_GROBID_PORT:-8070}:8070"
    networks:
      - colony-net
    # Same TCP-listener probe as qdrant — the grobid image is a JRE
    # base without curl/wget. ``/api/isalive`` would tell us more,
    # but a listening 8070 is sufficient for ``depends_on``.
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8070' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  kafka:
    image: apache/kafka:3.9.2
    container_name: colony-kafka
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_LOG_RETENTION_HOURS=24
      - KAFKA_LOG_RETENTION_BYTES=1073741824
    ports:
      - "${COLONY_KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - colony-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  dashboard:
    image: ${COLONY_IMAGE:-colony:local}
    container_name: colony-dashboard
    command:
      - /home/ray/app/src/polymathera/colony/cli/deploy/docker/cluster-runtime-hook.sh
      - dashboard
      - --
      - python
      - -m
      - polymathera.colony.web_ui.backend.main
    ports:
      - "${COLONY_DASHBOARD_UI_PORT:-8080}:8080"
    environment:
      - RAY_CLIENT_ADDRESS=ray://ray-head:10001
      - RAY_DASHBOARD_URL=http://ray-head:8265
      - PROMETHEUS_URL=http://ray-head:9090
      # See ray-head: same protobuf>=4 / opentelemetry-proto<1.32 issue.
      # The dashboard imports Ray client modules that touch the broken pb2s.
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
      # Redis — blackboard, state management, event bus
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Observability
      - TRACING_ENABLED=true
      # Kafka — log streaming + span consumer
      - KAFKA_BOOTSTRAP=kafka:9092
      # PostgreSQL — auth, chat persistence, observability
      - RDS_HOST=postgres
      - RDS_PORT=5432
      - RDS_USER=colony
      - RDS_PASSWORD=${COLONY_PG_PASSWORD:-colony_dev}
      - RDS_DB_NAME=colony
      # Polymathera environment
      - RAY_CLUSTER_ENVIRONMENT=true
      - POLYMATHERA_ENV=development
      - POLYMATHERA_RUNNING_LOCALLY=true
      # Operator YAML path — the global ConfigurationManager loads this at
      # startup. ``colony-env up --config`` `docker cp`s the file into
      # /mnt/shared/config.yaml on the colony-shared volume mounted into
      # every container below. If the file is not yet present (the cp is
      # async w.r.t. container start), ConfigurationManager falls through to
      # defaults + env vars cleanly.
      - POLYMATHERA_CONFIG=/mnt/shared/config.yaml
      - PROMETHEUS_PORT=9090
      # Authentication - local mode
      - AUTH_ENABLED=False
      # Storage backends — same as ray-head/workers
      - DISTRIBUTED_FS_BACKEND=local
      - LOCAL_FS_ROOT_PATH=/mnt/shared/filesystem
      - OBJECT_STORAGE_BACKEND=disabled
      - JSON_STORAGE_BACKEND=local
      - JSON_STORAGE_LOCAL_PATH=/mnt/shared/json_storage
      - GIT_COLD_STORAGE_ENABLED=False
      - RELATIONAL_STORAGE_BACKEND=local
      # API keys — forwarded from host environment
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      # GitHub App credentials. The dashboard process serves the
      # ``/auth/github/connect`` + ``/auth/github/callback`` routes,
      # which need the App's OAuth client_id/secret to drive the
      # user-to-server "Connect GitHub" flow. App ID + private key
      # mirror ray-head/ray-worker for symmetry + so future
      # dashboard-side endpoints that need installation tokens
      # (e.g. verifying a tenant's pasted installation_id) have the
      # credentials already in env. Without all four, the OAuth
      # router 503s with a clean "GitHub OAuth not configured" detail.
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_PRIVATE_KEY_PEM=${GITHUB_PRIVATE_KEY_PEM:-}
      - GITHUB_APP_CLIENT_ID=${GITHUB_APP_CLIENT_ID:-}
      - GITHUB_APP_CLIENT_SECRET=${GITHUB_APP_CLIENT_SECRET:-}
      # Knowledge stack — Qdrant URL, GROBID URL, PDF extractor
      # backend, and image directory live in the operator YAML
      # (``knowledge`` — see configs/example.yaml).
      # The dashboard reads the same YAML via POLYMATHERA_CONFIG, so
      # it sees the SAME Qdrant the agents ingest into.
      # PDF-extractor API keys — only the one matching the active
      # backend is used at runtime.
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - LLAMA_CLOUD_API_KEY=${LLAMA_CLOUD_API_KEY:-}
      # Hugging Face Hub auth — kept here for parity with ray-head /
      # ray-worker so dashboard-side PDF previews (Marker / MinerU /
      # Docling) can authenticate against the Hub if the operator
      # ever calls the extractor from the dashboard process.
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      # Slack chat service (optional)
      - SLACK_ENABLED=false
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
    volumes:
      - colony-shared:/mnt/shared
      - colony-overlay:/opt/colony-overlay
      # L1-G runtime config: written by ``colony-env up`` before compose
      # invocation. The container-start hook reads it on boot. The host
      # path always exists (colony-env writes a stub when no extensions
      # are configured) so the bind mount never silently turns into a
      # directory.
      - ./.runtime/cluster-runtime.json:/etc/colony/cluster-runtime.json:ro
      # Operator YAML (the ``--config`` arg to ``colony-env up``) materialized
      # into ``.runtime/operator-config.yaml`` before compose runs. The
      # ray-head entrypoint checks /etc/colony/cluster.yaml *first* ahead of
      # the /mnt/shared/config.yaml fallback, so this bind sidesteps the
      # ``docker cp`` race (polymath deploy would otherwise read /mnt/shared
      # before colony-env can populate it and exit with FileNotFoundError).
      - ./.runtime/operator-config.yaml:/etc/colony/cluster.yaml:ro
    depends_on:
      ray-head:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - colony-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/infra/status')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  colony-shared:
  # Persistent overlay for L1-G ``cluster.extensions.packages``: the
  # container-start hook pip-installs the resolved package list here,
  # cache-keyed by the resolved hash. Survives ``colony-env down`` so
  # restart-with-same-config skips reinstall.
  colony-overlay:
  redis-data:
  postgres-data:
  kafka-data:
  qdrant-data:

networks:
  colony-net:
    name: colony-net
    driver: bridge
