# Colony local development cluster
# Usage: docker compose -f docker-compose.yml up -d
# Managed by: colony-env CLI

services:
  ray-head:
    build:
      context: ../../../../../..   # colony repo root (where pyproject.toml lives)
      dockerfile: src/polymathera/colony/cli/deploy/docker/Dockerfile.local
    image: colony:local
    container_name: colony-ray-head
    command: >
      ray start --head
      --port=6379
      --dashboard-host=0.0.0.0
      --dashboard-port=8265
      --ray-client-server-port=10001
      --num-cpus=0
      --block
    ports:
      - "${COLONY_DASHBOARD_PORT:-8265}:8265"
      - "${COLONY_CLIENT_PORT:-10001}:10001"
      - "${COLONY_METRICS_PORT:-9090}:9090"
    volumes:
      - colony-shared:/mnt/shared
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RAY_CLUSTER_ENVIRONMENT=true
      - POLYMATHERA_ENV=development
      - POLYMATHERA_RUNNING_LOCALLY=true
      - PROMETHEUS_PORT=9090
      # Authentication - local mode
      - AUTH_ENABLED=False
      # Storage backends — local mode
      - DISTRIBUTED_FS_BACKEND=local
      - LOCAL_FS_ROOT_PATH=/mnt/shared/filesystem
      - OBJECT_STORAGE_BACKEND=disabled
      - JSON_STORAGE_BACKEND=local
      - JSON_STORAGE_LOCAL_PATH=/mnt/shared/json_storage
      - GIT_COLD_STORAGE_ENABLED=False
      - RELATIONAL_STORAGE_BACKEND=local
      # PostgreSQL
      - RDS_HOST=postgres
      - RDS_PORT=5432
      - RDS_USER=colony
      - RDS_PASSWORD=${COLONY_PG_PASSWORD:-colony_dev}
      - RDS_DB_NAME=colony
      # Observability (tracing)
      - TRACING_ENABLED=true
      - KAFKA_BOOTSTRAP=kafka:9092
      # API keys — forwarded from host environment
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      # Slack chat service (optional)
      - SLACK_ENABLED=false
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    shm_size: '4gb'
    networks:
      - colony-net
    healthcheck:
      test: ["CMD", "ray", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ray-worker:
    image: colony:local
    command: >
      ray start
      --address=ray-head:6379
      --block
    volumes:
      - colony-shared:/mnt/shared
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RAY_CLUSTER_ENVIRONMENT=true
      - POLYMATHERA_ENV=development
      - POLYMATHERA_RUNNING_LOCALLY=true
      - PROMETHEUS_PORT=9090
      # Authentication - local mode
      - AUTH_ENABLED=False
      # Storage backends — local mode
      - DISTRIBUTED_FS_BACKEND=local
      - LOCAL_FS_ROOT_PATH=/mnt/shared/filesystem
      - OBJECT_STORAGE_BACKEND=disabled
      - JSON_STORAGE_BACKEND=local
      - JSON_STORAGE_LOCAL_PATH=/mnt/shared/json_storage
      - GIT_COLD_STORAGE_ENABLED=False
      - RELATIONAL_STORAGE_BACKEND=local
      # PostgreSQL
      - RDS_HOST=postgres
      - RDS_PORT=5432
      - RDS_USER=colony
      - RDS_PASSWORD=${COLONY_PG_PASSWORD:-colony_dev}
      - RDS_DB_NAME=colony
      # Observability (tracing)
      - TRACING_ENABLED=true
      - KAFKA_BOOTSTRAP=kafka:9092
      # API keys — forwarded from host environment
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      # Slack chat service (optional)
      - SLACK_ENABLED=false
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
    depends_on:
      ray-head:
        condition: service_healthy
    shm_size: '4gb'
    networks:
      - colony-net

  redis:
    image: redis:7-alpine
    container_name: colony-redis
    command: redis-server --appendonly yes --protected-mode no --maxclients 10000
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${COLONY_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - colony-net

  postgres:
    image: postgres:16-alpine
    container_name: colony-postgres
    environment:
      - POSTGRES_USER=colony
      - POSTGRES_PASSWORD=${COLONY_PG_PASSWORD:-colony_dev}
      - POSTGRES_DB=colony
    ports:
      - "${COLONY_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - colony-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colony"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:3.9.2
    container_name: colony-kafka
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_LOG_RETENTION_HOURS=24
      - KAFKA_LOG_RETENTION_BYTES=1073741824
    ports:
      - "${COLONY_KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - colony-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  dashboard:
    image: colony:local
    container_name: colony-dashboard
    command: >
      python -m polymathera.colony.web_ui.backend.main
    ports:
      - "${COLONY_DASHBOARD_UI_PORT:-8080}:8080"
    environment:
      - RAY_CLIENT_ADDRESS=ray://ray-head:10001
      - RAY_DASHBOARD_URL=http://ray-head:8265
      - PROMETHEUS_URL=http://ray-head:9090
      - KAFKA_BOOTSTRAP=kafka:9092
      - RDS_HOST=postgres
      - RDS_PORT=5432
      - RDS_USER=colony
      - RDS_PASSWORD=${COLONY_PG_PASSWORD:-colony_dev}
      - RDS_DB_NAME=colony
    depends_on:
      ray-head:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - colony-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/infra/status')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  colony-shared:
  redis-data:
  postgres-data:
  kafka-data:

networks:
  colony-net:
    name: colony-net
    driver: bridge
