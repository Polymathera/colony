# `.colony/repo_map.yaml` — VCM mapping + KB ingestion declarations
# for this design monorepo.
#
# Two **independent** sections — ticking one does not imply the other:
#
#   vcm_sources:        list of named scopes the framework maps into
#                       VCM. The materialiser issues one
#                       ``mmap_application_scope`` call per row.
#   knowledge_sources:  list of named glob bundles the KB materialiser
#                       feeds to the process-singleton ``Ingestor``.
#
# The Design Monorepo tab renders one checkbox list per section so
# the operator picks each independently. The same path can appear in
# both, one, or neither — VCM mapping and KB ingestion are
# orthogonal operations.
#
# Full schema reference: docs/architecture/repo-map.md.

schema_version: 1

# ---------- VCM mapping ----------------------------------------------
vcm_sources:
  # Default: maps every file under the repo root into a single VCM
  # scope — what the framework falls back to when this file is absent.
  - name: default
    type: git_repo

  # Code subtree, build artifacts excluded:
  # - name: design-code
  #   type: git_repo
  #   start_dir: code/
  #   exclude_globs: ["**/build/**", "**/__pycache__/**", "**/node_modules/**"]
  #   binary_policy: skip
  #   flush_threshold: 8         # smaller groups → smaller pages
  #   flush_token_budget: 2048

  # Literature directory — flows through the prose chunker before paging.
  # - name: literature
  #   type: literature
  #   start_dir: literature/
  #   chunk_target_tokens: 800
  #   chunk_overlap_tokens: 64

  # Frozen external dependency declared as a git submodule:
  # - name: external-foo
  #   type: git_repo
  #   submodule: third_party/foo
  #   start_dir: src/
  #   static: true
  #   pinned: true

# ---------- KB ingestion ---------------------------------------------
# Independent from ``vcm_sources``. Each row is a named glob bundle
# the materialiser ingests via ``Ingestor``. ``profile`` becomes the
# ``data_type`` label on resulting chunks.
knowledge_sources: []
  # Examples — uncomment and adapt to your literature layout:
  #
  # - name: literature
  #   paths: ["literature/curated/**/*.pdf"]
  #   profile: scientific_paper
  #
  # - name: standards
  #   paths: ["standards/**/*.pdf"]
  #   profile: standard_clause
