# `.colony/repo_map.yaml` — VCM mapping + KB ingestion + design-context
# declarations for this design monorepo.
#
# Three **independent** sections — ticking one does not imply the others:
#
#   vcm_sources:             list of named scopes the framework maps
#                            into VCM. The materialiser issues one
#                            ``mmap_application_scope`` call per row.
#   knowledge_sources:       list of named glob bundles the KB
#                            materialiser feeds to the process-
#                            singleton ``Ingestor``.
#   design_context_sources:  list of markdown corpora declared as
#                            "design context". The materialiser routes
#                            each row through VCM chunked pages (and,
#                            once Phase 3 ships, Kuzu KG claim
#                            extraction). Raw read_file access needs
#                            no declaration.
#
# The Design Monorepo tab renders checkbox lists for the operator-
# facing sections (vcm_sources, knowledge_sources). The same path can
# appear in any combination — the three operations are orthogonal.
#
# Full schema reference: docs/architecture/repo-map.md.

schema_version: 3

# ---------- VCM mapping ----------------------------------------------
vcm_sources:
  # Default: maps every file under the repo root into a single VCM
  # scope — what the framework falls back to when this file is absent.
  - name: default
    type: git_repo

  # Code subtree, build artifacts excluded:
  # - name: design-code
  #   type: git_repo
  #   start_dir: code/
  #   exclude_globs: ["**/build/**", "**/__pycache__/**", "**/node_modules/**"]
  #   binary_policy: skip
  #   flush_threshold: 8         # smaller groups → smaller pages
  #   flush_token_budget: 2048

  # Literature directory — flows through the prose chunker before paging.
  # - name: literature
  #   type: literature
  #   start_dir: literature/
  #   chunk_target_tokens: 800
  #   chunk_overlap_tokens: 64

  # Frozen external dependency declared as a git submodule:
  # - name: external-foo
  #   type: git_repo
  #   submodule: third_party/foo
  #   start_dir: src/
  #   static: true
  #   pinned: true

# ---------- KB ingestion ---------------------------------------------
# Independent from ``vcm_sources``. Each row is one of two shapes:
#
#   - ``paths``: glob bundle of files the materialiser already has on
#     disk (e.g., literature you copied into the repo by hand). Walked
#     and ingested as-is.
#   - ``acquirer`` + ``destination``: a remote-source fetcher (arXiv,
#     DOI, HTTP) — the materialiser runs it, writes the file into
#     ``<destination>/`` inside the repo, and ingests it. Acquired
#     files + extraction sidecars are committed in one batch per
#     ingest invocation.
#
# In both cases the PDF extractor's markdown + per-source manifest are
# persisted in a ``.ingested/<stem>/`` sidecar next to each source so
# re-ingest skips the extractor when the PDF is unchanged. ``profile``
# becomes the ``data_type`` label on resulting chunks; ``tier`` flows
# through to the chunks' :class:`CorpusTier` for retrieval weighting.
knowledge_sources: []
  # Examples — uncomment and adapt to your literature layout:
  #
  # - name: literature
  #   paths: ["kb/literature/**/*.pdf"]
  #   profile: scientific_paper
  #   tier: tier_3_research
  #
  # - name: standards
  #   paths: ["kb/standards/**/*.pdf"]
  #   profile: standard_clause
  #   tier: tier_2_standards
  #
  # - name: allred_2002
  #   acquirer:
  #     method: arxiv_id
  #     args: { arxiv_id: "physics/0205063" }
  #   destination: kb/literature/atomic-physics/
  #   profile: scientific_paper
  #   tier: tier_3_research

# ---------- Design-context declarations ------------------------------
# Free-form layout: no closed role vocabulary. Each row declares "this
# set of markdown files counts as design context"; agents (LLMs) infer
# the structure (objectives / constraints / alternatives / hypotheses /
# decisions / contradicts / verifies / ...) per chunk during KG
# ingestion (Phase 3). Free-form ``hint`` is an extractor cue, never
# a gate.
#
# Set ``pin_in_vcm: true`` to lock the materialised pages so they
# survive eviction (renewer task refreshes the locks ahead of expiry).
# Use sparingly — pinned pages reduce the working-set budget available
# for transient context.
design_context_sources: []
  # Examples — uncomment and adapt to your design-doc layout:
  #
  # - name: system-design-docs
  #   paths:
  #     - "kb/design/**/*.md"
  #     - "docs/**/*.md"
  #     - "src/**/design_notes/*.md"
  #   hint: |
  #     Mission, success criteria, hard constraints, design
  #     alternatives, hypotheses, and decisions. Files frequently
  #     mix multiple kinds within a single document.
  #   pin_in_vcm: true
  #   pin_lock_duration_days: 7
  #
  # - name: hypotheses
  #   paths: ["**/hypotheses/*.md"]
  #
  # ``is_roadmap: true`` marks the row whose single literal path is
  # the project roadmap. ``DesignProcessCapability``'s bootstrap /
  # sync / propose actions read + write THIS path; no kwarg the
  # LLM planner could hallucinate. At most one such row per repo;
  # the path must be a literal filename (no glob characters).
  #
  # - name: roadmap
  #   paths: ["ROADMAP.md"]
  #   is_roadmap: true
