# Colony operator configuration — annotated example.
# ===================================================
# Pass to the CLI:
#   colony-env up --workers 3 --config /path/to/this/file.yaml
#
# Sections marked LEGACY are read by the dataclass parser in
# `cli/polymath.py` (the TestConfig path). Sections marked TYPED are read
# by the new ConfigurationManager into registered ConfigComponents — every
# field can also be overridden by `POLYMATHERA_<PATH>_<FIELD>` env vars.
# Both layers parse the same YAML; sections they share (cluster,
# agent_system) populate both.
#
# See colony/configs/README.md for the override chain and extension surface.

# ---------------------------------------------------------------------------
# Identity (LEGACY — TestConfig)
# ---------------------------------------------------------------------------
repo_id: "my-project"
tenant_id: "test-tenant"
colony_id: "test-colony"
# session_id, run_id are auto-generated when omitted.

# ---------------------------------------------------------------------------
# LLM Cluster (LEGACY — TestConfig.cluster)
# ---------------------------------------------------------------------------
cluster:
  app_name: "polymathera"
  cleanup_on_init: true
  remote_deployments:
    - model_name: "claude-sonnet-4-6"
      provider: "anthropic"          # registered via cluster/anthropic_deployment.py
      api_key_env_var: "ANTHROPIC_API_KEY"
      max_cached_pages: 50
      max_cached_tokens: 2000000
      ttl: "1h"
      num_replicas: 1
    # Add an OpenRouter deployment by uncommenting:
    # - model_name: "deepseek/deepseek-v3.2"
    #   provider: "openrouter"        # registered via cluster/openrouter_deployment.py
    #   api_key_env_var: "OPENROUTER_API_KEY"
    #   num_replicas: 1
  # vllm_deployments: []              # Self-hosted vLLM (requires GPUs)
  # embedding_config / remote_embedding_config / st_embedding_config: see
  # cluster/config.py for the schema (mutually exclusive).

# ---------------------------------------------------------------------------
# VCM Paging (LEGACY — TestConfig.paging)
# ---------------------------------------------------------------------------
paging:
  flush_threshold: 20
  flush_token_budget: 4096
  flush_interval_seconds: 60.0
  pinned: false
  locality_policy_type: "tag"
  flush_policy_type: "threshold"

# ---------------------------------------------------------------------------
# Analyses (LEGACY — TestConfig.analyses)
# ---------------------------------------------------------------------------
analyses:
  - type: impact
    coordinator_version: v2
    max_agents: 10
    quality_threshold: 0.7
    max_iterations: 50
    batching_policy: hybrid
    overlap_threshold: 0.3
    batch_size: 5
    prefetch_depth: 2
    planning_params:
      strategy: mpc
      prompt_formatting: alias
      planning_horizon: 5
      replan_every_n_steps: 3
      replan_on_failure: true
    changes:
      - file_path: "src/main.py"
        change_type: modification
        description: "Refactored authentication flow"

# ---------------------------------------------------------------------------
# Hierarchy (LEGACY — TestConfig.hierarchy)
# ---------------------------------------------------------------------------
hierarchy:
  extra_capabilities:
    - ReflectionCapability
    - ConsciousnessCapability

# ---------------------------------------------------------------------------
# Job IO (LEGACY)
# ---------------------------------------------------------------------------
output_dir: "./polymath-results"
timeout_seconds: 600
verbose: false
# budget_usd: 5.00
# warn_budget_pct: 0.8

# ===========================================================================
# TYPED ConfigComponent overrides
# ===========================================================================
# Every section below maps to a registered ConfigComponent (see README.md
# §Registered components). All fields are optional — Pydantic defaults apply
# when omitted. Field-level env-var bindings are documented in each
# component's source.

# --- Agent system ---------------------------------------------------------
# Source: agents/config.py:AgentSystemConfig
# agent_system:
#   max_retries: 3
#   enable_sessions: true
#   default_session_ttl: 86400.0
#   blackboard_backend_type: "distributed"   # "distributed" | "redis" | "memory"

# --- Knowledge layer (PDF extractor + vector store + GROBID) -------------
# Source: knowledge/cluster_config.py:KnowledgeConfig
#
# Single source of truth for knowledge-layer config. Every Ray worker
# re-reads this from its own ConfigurationManager (the YAML mounts at
# POLYMATHERA_CONFIG in every container), so driver and actors agree
# on the configured backends without any env-var passthrough.
#
# Cost / quality tiers for pdf_extractor (per page, ballpark):
#   mistral_ocr  ~$0.001  cheap OCR + figure crops
#   anthropic    ~$0.003  multimodal, prompt-cache friendly
#   gemini       ~$0.003  multimodal, long context
#   llamaparse   $0.003-$0.05  tiered (fast | cost_effective | agentic | agentic_plus)
#   marker       self-hosted (GPU recommended) — install marker-pdf manually,
#                see knowledge/readers/marker_deployment.py header
#   docling      self-hosted (CPU ok)
#   mineru       self-hosted (GPU recommended)
knowledge:
  pdf_extractor:
    backend: mistral_ocr            # default
    options: {}                     # forwarded as backend_kwargs to the reader

  # Persist figure bytes across container restarts (visible to the
  # dashboard's KB tab). Empty selects the in-memory image store.
  image_dir: "/mnt/shared/colony-images"

  # On-disk Kùzu DB for the design-context knowledge graph (path-1
  # ingestion of the top-level design plan). Shared with literature
  # / standards ingestion so cross-corpus queries work natively. Empty
  # selects InMemoryGraphStore (claims lost on process restart — fine
  # for tests / single-process dev).
  graph_db_path: "/mnt/shared/colony-design-graph.kuzu"

  # LLM-driven claim extraction (path-1 ingestion). When true (the
  # default), the singleton Ingestor's extractor tuple is
  # ``(LLMClaimExtractor, DeterministicClaimExtractor)`` — the LLM
  # produces open-set typed claims (``hypothesizes`` / ``contradicts``
  # / ``verifies`` / ``constrains`` / ...) that ``find_inconsistencies``
  # and ``audit_hypothesis_coverage`` query, alongside the
  # rule-based ``is_a`` patterns. Set to false to ship deterministic-
  # only (no LLM cost; design-process actions return sparse results).
  # Graceful degradation: if true but no LLM cluster is deployed, the
  # extractor logs the per-chunk failure at WARN and returns 0 claims
  # (the deterministic extractor still runs).
  llm_claim_extraction_enabled: true
  llm_claim_extraction_max_tokens: 2048
  llm_claim_extraction_temperature: 0.1
  llm_claim_extraction_timeout_s: 30.0

  # Vector store. Empty url selects InMemoryVectorStore (fine for
  # tests / single-process dev). The values below match the
  # docker-compose service.
  qdrant:
    url: "http://qdrant:6333"
    collection: "colony_knowledge"

  # GROBID PDF-to-TEI metadata extractor. Empty url disables the
  # GROBID metadata reader.
  grobid:
    url: "http://grobid:8070"

  # Other backends — uncomment one and comment out ``pdf_extractor``
  # above to switch:
  #
  # Anthropic (multimodal, prompt-cache friendly):
  # pdf_extractor:
  #   backend: anthropic
  #   options:
  #     model: "claude-sonnet-4-6"
  #     prompt_cache: true
  #
  # Gemini (multimodal, long context):
  # pdf_extractor:
  #   backend: gemini
  #   options:
  #     model: "gemini-2.5-pro"     # or gemini-2.5-flash for cheaper
  #
  # LlamaParse (tiered):
  # pdf_extractor:
  #   backend: llamaparse
  #   options:
  #     tier: cost_effective        # fast | cost_effective | agentic | agentic_plus
  #
  # Self-hosted (Docling, MinerU, Marker):
  # pdf_extractor:
  #   backend: docling
  #   replicas: 1
  #   num_gpus: 0                    # set to 1 for GPU; docling runs ok on CPU

