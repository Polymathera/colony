# Repository stats collector configuration
ray_repo_stats_collector_config:
  type: "WorkerDeploymentOptions"
  num_cpus: 0.25
  num_gpus: 0
  memory: 2147483648 # 2GB
  # object_store_memory: 1073741824  # 1GB - DEPRECATED, use object spilling instead
  #runtime_env:
  #  pip: ["git+https://github.com/org/repo.git"]
  resources:
    custom_cpu: 0.001  # Schedule on CPU-only nodes: fractional tag ensures affinity to CPU nodes but allows many actors per node, as the custom resource won't be the bottleneck
  max_concurrency: 4
  # Ray Serve-specific configuration
  max_ongoing_requests: 1
  # Ray Serve autoscaling configuration
  autoscaling_config:
    min_replicas: 1
    max_replicas: 10
    target_num_ongoing_requests_per_replica: 1
    downscale_delay_s: 300.0  # 5 minutes - longer delay for expensive repo stats operations
    upscale_delay_s: 30.0     # 30 seconds - faster upscale for responsiveness



# Ray cluster configuration
ray_params:
  ray_config:
    #address: "ray://ray-head:10001"
    runtime_env:
      working_dir: "${APP_MOUNT_PATH}"
      pip: ["torch", "transformers", "accelerate", "bitsandbytes", "optimum"]
    _system_config:
      health_check_timeout_ms: 5000

# Global code analysis configuration
ray_global_code_analysis_config:
  type: "WorkerDeploymentOptions"
  num_cpus: 1
  num_gpus: 1
  memory: 8589934592  # 8GB
  # object_store_memory: 4294967296  # 4GB - DEPRECATED, use object spilling instead
  max_concurrency: 1

# Local code analysis configuration
ray_local_code_analysis_config:
  type: "WorkerDeploymentOptions"
  num_cpus: 1
  num_gpus: 0.5
  memory: 4294967296  # 4GB
  # object_store_memory: 2147483648  # 2GB - DEPRECATED, use object spilling instead
  max_concurrency: 2

# You can add other configurations here if needed
