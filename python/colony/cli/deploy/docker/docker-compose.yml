# Colony local development cluster
# Usage: docker compose -f docker-compose.yml up -d
# Managed by: colony-env CLI

services:
  ray-head:
    build:
      context: ../../../../..   # colony repo root (where pyproject.toml lives)
      dockerfile: python/colony/cli/deploy/docker/Dockerfile.local
    image: colony:local
    container_name: colony-ray-head
    command: >
      ray start --head
      --port=6379
      --dashboard-host=0.0.0.0
      --dashboard-port=8265
      --ray-client-server-port=10001
      --num-cpus=0
      --block
    ports:
      - "${COLONY_DASHBOARD_PORT:-8265}:8265"
      - "${COLONY_CLIENT_PORT:-10001}:10001"
      - "${COLONY_METRICS_PORT:-9090}:9090"
    volumes:
      - colony-shared:/mnt/shared
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RAY_CLUSTER_ENVIRONMENT=true
      - POLYMATHERA_ENV=development
      - POLYMATHERA_RUNNING_LOCALLY=true
      - PROMETHEUS_PORT=9090
      # Authentication - local mode
      - AUTH_ENABLED=False
      # Storage backends — local mode
      - DISTRIBUTED_FS_BACKEND=local
      - LOCAL_FS_ROOT_PATH=/mnt/shared/filesystem
      - OBJECT_STORAGE_BACKEND=disabled
      - JSON_STORAGE_BACKEND=local
      - JSON_STORAGE_LOCAL_PATH=/mnt/shared/json_storage
      - GIT_COLD_STORAGE_ENABLED=False
      - RELATIONAL_STORAGE_BACKEND=local
      # PostgreSQL
      - RDS_HOST=postgres
      - RDS_PORT=5432
      - RDS_USER=colony
      - RDS_PASSWORD=colony_dev
      - RDS_DB_NAME=colony
      # API keys — forwarded from host environment
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    shm_size: '4gb'
    networks:
      - colony-net
    healthcheck:
      test: ["CMD", "ray", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ray-worker:
    image: colony:local
    command: >
      ray start
      --address=ray-head:6379
      --block
    volumes:
      - colony-shared:/mnt/shared
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RAY_CLUSTER_ENVIRONMENT=true
      - POLYMATHERA_ENV=development
      - POLYMATHERA_RUNNING_LOCALLY=true
      - PROMETHEUS_PORT=9090
      # Authentication - local mode
      - AUTH_ENABLED=False
      # Storage backends — local mode
      - DISTRIBUTED_FS_BACKEND=local
      - LOCAL_FS_ROOT_PATH=/mnt/shared/filesystem
      - OBJECT_STORAGE_BACKEND=disabled
      - JSON_STORAGE_BACKEND=local
      - JSON_STORAGE_LOCAL_PATH=/mnt/shared/json_storage
      - GIT_COLD_STORAGE_ENABLED=False
      - RELATIONAL_STORAGE_BACKEND=local
      # PostgreSQL
      - RDS_HOST=postgres
      - RDS_PORT=5432
      - RDS_USER=colony
      - RDS_PASSWORD=colony_dev
      - RDS_DB_NAME=colony
      # API keys — forwarded from host environment
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
    depends_on:
      ray-head:
        condition: service_healthy
    shm_size: '4gb'
    networks:
      - colony-net

  redis:
    image: redis:7-alpine
    container_name: colony-redis
    command: redis-server --appendonly yes --protected-mode no --maxclients 10000
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${COLONY_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - colony-net

  postgres:
    image: postgres:16-alpine
    container_name: colony-postgres
    environment:
      - POSTGRES_USER=colony
      - POSTGRES_PASSWORD=colony_dev
      - POSTGRES_DB=colony
    ports:
      - "${COLONY_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - colony-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colony"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  colony-shared:
  redis-data:
  postgres-data:

networks:
  colony-net:
    name: colony-net
    driver: bridge
