name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        # Pinned to match ``cli/deploy/docker/Dockerfile.local``; see
        # ``ci.yml`` for the failure mode unpinned Poetry triggers.
        run: pip install poetry==1.7.1
      - name: Configure Poetry
        run: poetry config virtualenvs.create false
      - name: Pre-install python-louvain (avoid virtualenv-21 sdist-build regression)
        # See the matching step in ``ci.yml`` for the full rationale.
        run: pip install --no-cache-dir python-louvain==0.16
      - name: Install dependencies
        run: poetry install --no-interaction --extras "code_analysis cpu dashboard"
      - name: Build docs
        run: mkdocs build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
