# Colony Example: Change Impact Analysis
# =======================================
# Traces the ripple effects of code changes across a codebase.
# Uses multi-hop dependency propagation, hypothesis games for
# validating critical impacts, and game-theoretic merge policies.
#
# Run:
#   colony-env run --local-repo /path/to/codebase --config impact-analysis.yaml

repo_id: "my-project"
tenant_id: "example"

cluster:
  app_name: "polymathera"
  remote_deployments:
    - model_name: "claude-sonnet-4-20250514"
      provider: "anthropic"
      api_key_env_var: "ANTHROPIC_API_KEY"
      max_cached_pages: 50
      max_cached_tokens: 2000000
      ttl: "1h"
      num_replicas: 1

paging:
  flush_threshold: 20
  flush_token_budget: 4096

analyses:
  - type: impact
    coordinator_version: v2
    max_agents: 10
    quality_threshold: 0.7
    max_iterations: 10
    batching_policy: hybrid
    overlap_threshold: 0.3
    batch_size: 5
    prefetch_depth: 2

    # --- What changed? ---
    # List the files and changes to trace through the codebase.
    changes:
      - file_path: "src/main.py"
        change_type: modification
        description: "Refactored authentication flow"
      - file_path: "src/auth/handler.py"
        change_type: modification
        description: "Updated token validation logic"

hierarchy:
  extra_capabilities:
    - ReflectionCapability
    - ConsciousnessCapability

output_dir: "./results"
timeout_seconds: 600
# budget_usd: 5.00
