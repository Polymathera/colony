# Colony Example: Compliance Audit
# =================================
# Checks license, regulatory, security, and organizational compliance.
# Builds obligation graphs linking requirements to source evidence
# and detects license compatibility conflicts.
#
# Run:
#   colony-env run --local-repo /path/to/codebase --config compliance-audit.yaml

repo_id: "my-project"
tenant_id: "example"

cluster:
  app_name: "polymathera"
  remote_deployments:
    - model_name: "claude-sonnet-4-20250514"
      provider: "anthropic"
      api_key_env_var: "ANTHROPIC_API_KEY"
      max_cached_pages: 50
      max_cached_tokens: 2000000
      ttl: "1h"
      num_replicas: 1

paging:
  flush_threshold: 20
  flush_token_budget: 4096

analyses:
  - type: compliance
    coordinator_version: v2
    max_agents: 8
    quality_threshold: 0.7

    # --- What to check ---
    # Available types: license, regulatory, security, organizational,
    #                  industry, architectural, quality
    compliance_types:
      - license
      - security
      - quality

hierarchy:
  extra_capabilities:
    - ReflectionCapability

output_dir: "./results"
timeout_seconds: 600
# budget_usd: 5.00
