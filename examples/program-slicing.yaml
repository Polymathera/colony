# Colony Example: Program Slicing
# ================================
# Extracts the minimal code subset affecting a target variable or
# expression. Supports backward, forward, chopping, dynamic, and
# conditioned slices with LLM-based dependency reasoning.
#
# Run:
#   colony-env run --local-repo /path/to/codebase --config program-slicing.yaml

repo_id: "my-project"
tenant_id: "example"

cluster:
  app_name: "polymathera"
  remote_deployments:
    - model_name: "claude-sonnet-4-20250514"
      provider: "anthropic"
      api_key_env_var: "ANTHROPIC_API_KEY"
      max_cached_pages: 50
      max_cached_tokens: 2000000
      ttl: "1h"
      num_replicas: 1

paging:
  flush_threshold: 20
  flush_token_budget: 4096

analyses:
  - type: slicing
    coordinator_version: v2
    max_agents: 8

    # --- Slice criteria ---
    # What variable / expression to trace, and how.
    slice_criteria:
      - file_path: "src/main.py"
        line: 42
        variable: "user_token"
        slice_type: "backward"     # "backward", "forward", "chopping", "conditioned"

hierarchy:
  extra_capabilities:
    - ReflectionCapability

output_dir: "./results"
timeout_seconds: 600
# budget_usd: 5.00
