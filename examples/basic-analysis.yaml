# Colony Example: Codebase Analysis
# ==================================
# General-purpose code structure analysis. The coordinator spawns
# ClusterAnalyzer agents that perform page-level analysis, cross-page
# query resolution, and cluster-level synthesis.
#
# Run:
#   colony-env run --local-repo /path/to/codebase --config basic-analysis.yaml

repo_id: "my-project"
tenant_id: "example"

cluster:
  app_name: "polymathera"
  remote_deployments:
    - model_name: "claude-sonnet-4-20250514"
      provider: "anthropic"
      api_key_env_var: "ANTHROPIC_API_KEY"
      max_cached_pages: 50
      max_cached_tokens: 2000000
      ttl: "1h"
      num_replicas: 1

paging:
  flush_threshold: 20
  flush_token_budget: 4096

analyses:
  - type: basic
    coordinator_version: v2       # v2 = cache-aware coordination
    max_agents: 10
    quality_threshold: 0.7
    max_iterations: 10
    batching_policy: hybrid

hierarchy:
  extra_capabilities:
    - ReflectionCapability

output_dir: "./results"
timeout_seconds: 600
# budget_usd: 5.00
